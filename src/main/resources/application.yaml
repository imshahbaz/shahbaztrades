spring:
  application:
    name: ShahbazTrades

  main:
    lazy-initialization: true

  threads:
    virtual:
      enabled: true

  jmx:
    enabled: false

  data:
    mongodb:
      uri: ${MONGO_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_USER}
      password: ${REDIS_PASS}
      ssl:
        enabled: true


server:
  undertow:
    threads:
      worker: 4
      io: 1
