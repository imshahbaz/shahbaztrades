name: Build and Deploy 1Klik App

on:
  push:
    branches:
      - web-eye-soft

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Multi-Arch Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/one_klik_java:oracle-vps
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/one_klik_java:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/one_klik_java:buildcache,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ORACLE_VPS_HOST }}
          username: ${{ secrets.ORACLE_VPS_USERNAME }}
          password: ${{ secrets.ORACLE_VPS_PASSWORD }}
          script: |
            bash /home/ubuntu/github-actions.sh
